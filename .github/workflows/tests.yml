name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd tests
          npm install

      - name: Install Playwright browsers
        run: |
          cd tests
          npx playwright install --with-deps

      - name: Run tests
        run: |
          cd tests
          npx playwright test